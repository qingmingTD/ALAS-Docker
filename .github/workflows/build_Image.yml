name: Sync and Build ALAS Image

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-alas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      # 从UpdateCode文件的最后一行获取文本
      - name: Get last line of UpdateCode
        id: get_last_line
        run: |
          last_line=$(tail -n 1 UpdateCode)
          echo "LAST_LINE=$last_line" >> $GITHUB_ENV

      # 从https://api.github.com/repos/LmeSzinc/AzurLaneAutoScript/commits?path=deploy/docker/requirements.txt获取sha值
      - name: Get sha of requirements.txt
        id: get_sha
        run: |
          sha=$(curl -s https://api.github.com/repos/LmeSzinc/AzurLaneAutoScript/commits?path=deploy/docker/requirements.txt | jq -r '.[0].sha')
          echo "SHA=$sha" >> $GITHUB_ENV

      # 比较UpdateCode文件的最后一行文本和requirements.txt中的sha值是否相同，并输出结果到GITHUB_ENV
      - name: Compare last line and sha
        id: compare
        run: echo "COMPARE_RESULT=$([ "$LAST_LINE" = "$SHA" ] && echo "true" || echo "false")" >> $GITHUB_ENV

      # 当COMPARE_RESULT为false时，开始构建Docker镜像，标签设置为构建时间，格式为v2026.05.05
      # 处理用户名将其全转为小写，避免用户名包含大写字母导致构建失败
      # 构建Docker镜像时，将sha值作为构建参数传递给Dockerfile中的ARG UPDATECODE打破后续缓存，确保每次构建都会重新安装依赖
      - name: Build Docker image
        if: env.COMPARE_RESULT == 'false'
        run: |
          DATE_TAG=$(date -u +"%Y.%m.%d")
          REPOSITORY_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "DATE_TAG=$DATE_TAG" >> $GITHUB_ENV
          echo "REPOSITORY_OWNER=$REPOSITORY_OWNER" >> $GITHUB_ENV
          docker build --build-arg UPDATECODE=$SHA -t ghcr.io/${REPOSITORY_OWNER}/alas:v$DATE_TAG -t ghcr.io/${REPOSITORY_OWNER}/alas:latest .

      # 上传构建好的Docker镜像到GitHub Packages
      - name: Push alas image to GitHub Packages
        if: env.COMPARE_RESULT == 'false'
        run: |
          echo ${{ github.token }} | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
          docker push ghcr.io/${REPOSITORY_OWNER}/alas:v$DATE_TAG
          docker push ghcr.io/${REPOSITORY_OWNER}/alas:latest
          echo "PUSH_RESULT=true" >> $GITHUB_ENV

      # 将sha值追加到UpdateCode文件的最后一行，并提交更改
      - name: Update UpdateCode file
        if: env.PUSH_RESULT == 'true'
        run: |
          echo "$SHA" >> UpdateCode
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update UpdateCode file"
          git push

  build-alas-full:
    runs-on: ubuntu-latest
    needs: build-alas
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # 从https://github.com/LmeSzinc/AzurLaneAutoScript/releases/latest获取最新的版本号
      - name: Get latest version of AzurLaneAutoScript
        id: get_latest_version
        run: |
          latest_version=$(curl -s https://api.github.com/repos/LmeSzinc/AzurLaneAutoScript/releases/latest | jq -r '.tag_name')
          echo "LATEST_VERSION=$latest_version" >> $GITHUB_ENV
      
      # 从使用github cli获取当前仓库中packages的最新tag标签，当package不存在时，LATEST_TAG为null
      - name: Get latest tag of current repository packages
        id: get_latest_tag
        env: 
          GH_TOKEN: ${{ github.token }}
        run: |
          latest_tag=$(gh api "users/qingmingTD/packages/container/alas-full/versions" \
          --jq '.[0].metadata.container.tags | [.[] | select(. != "latest")][0]' 2>/dev/null || echo "null")
          echo "LATEST_TAG=$latest_tag" >> $GITHUB_ENV
      
      # 比较最新版本号和最新tag标签是否相同，并输出结果到GITHUB_ENV
      - name: Compare latest version and latest tag
        id: compare_version_tag
        run: echo "COMPARE_VERSION_TAG_RESULT=$([ "$LATEST_VERSION" = "$LATEST_TAG" ] && echo "true" || echo "false")" >> $GITHUB_ENV

      # 当COMPARE_VERSION_TAG_RESULT为false时，开始构建Docker镜像，标签设置为最新版本号
      # 构建Docker镜像时，将最新版本号作为构建参数传递给Dockerfile中的ARG UPDATECODE打破后续缓存，确保每次构建都会重新安装依赖
      - name: Build Docker image with latest version
        if: env.COMPARE_VERSION_TAG_RESULT == 'false'
        run: |
          REPOSITORY_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "REPOSITORY_OWNER=$REPOSITORY_OWNER" >> $GITHUB_ENV
          docker build --build-arg UPDATECODE=$LATEST_VERSION \
          -t ghcr.io/${REPOSITORY_OWNER}/alas-full:$LATEST_VERSION \
          -t ghcr.io/${REPOSITORY_OWNER}/alas-full:latest ./full

      # 上传构建好的Docker镜像到GitHub Packages
      - name: Push alas-full image to GitHub Packages
        if: env.COMPARE_VERSION_TAG_RESULT == 'false'
        run: |
          echo ${{ github.token }} | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
          docker push ghcr.io/${REPOSITORY_OWNER}/alas-full:$LATEST_VERSION
          docker push ghcr.io/${REPOSITORY_OWNER}/alas-full:latest
